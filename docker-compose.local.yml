services:
  db:
    image: postgres:16
    container_name: postgres-local
    restart: unless-stopped
    environment:
      POSTGRES_DB: techapp
      POSTGRES_USER: techapp
      POSTGRES_PASSWORD: S3cret_demo!
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techapp -d techapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./app
    container_name: flask-app-local
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: techapp
      DB_USER: techapp
      DB_PASSWORD: S3cret_demo!
    depends_on:
      db:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    container_name: nginx-proxy-local
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./local-test/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  pgdata_local:
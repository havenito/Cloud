# Conf NGINX simplifiée pour le test local : pas de TLS ici (le but est de
# valider la chaîne proxy -> app -> base). Le HTTPS est déjà géré séparément
# par le rôle Ansible "reverse_proxy" pour le vrai déploiement sur les VMs.
server {
    listen 80;
    server_name _;
 
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
